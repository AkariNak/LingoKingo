<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Recall — Language Flashcards</title>
<meta name="description" content="Learn Korean, Italian, and Japanese with flashcards, practice exercises, and grammar notes. Free, no account needed."/>
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 72 72'%3E%3Crect width='72' height='72' rx='14' fill='%23c8a87a'/%3E%3Ctext x='36' y='50' text-anchor='middle' font-family='Georgia,serif' font-size='34' font-weight='600' fill='white'%3ER%3C/text%3E%3C/svg%3E"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Serif+Display:ital@0;1&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="style.css"/>
</head>
<body class="dark">

<div id="hdr">
  <div class="logo" style="display:flex;align-items:center;gap:14px">
    <svg width="44" height="44" viewBox="0 0 72 72" style="flex-shrink:0" aria-hidden="true">
      <rect width="72" height="72" rx="14" fill="var(--acc)"/>
      <rect x="10" y="10" width="52" height="52" rx="8" fill="none" stroke="rgba(255,255,255,0.28)" stroke-width="1.5"/>
      <text x="36" y="50" text-anchor="middle" font-family="Georgia,serif" font-size="34" font-weight="600" fill="white">R</text>
    </svg>
    <div>
      <span class="logo-en">recall</span>
      <span class="logo-sub" id="logoScript">language flashcards</span>
    </div>
  </div>
  <div class="hdr-r">
    <div class="lang-wrap">
      <button class="lang-btn" id="langBtn" onclick="toggleLangMenu()">
        <span id="langFlag">🇰🇷</span>
        <span id="langLabel">Korean</span>
        <span class="lang-chev">▾</span>
      </button>
    </div>
    <button id="themeBtn" onclick="toggleTheme()">light mode</button>
    <button class="reset-btn" onclick="localStorage.clear();location.reload()" title="clear session and reload">reset</button>
  </div>
</div>

<div id="tabBar">
  <button class="tab-btn" data-tab="vocab"    onclick="switchTab('vocab')">vocabulary</button>
  <button class="tab-btn" data-tab="practice" onclick="switchTab('practice')">practice</button>
  <button class="tab-btn" data-tab="grammar"  onclick="switchTab('grammar')">grammar</button>
  <button class="tab-btn" data-tab="songs"    onclick="switchTab('songs')">songs</button>
  <button class="tab-btn" data-tab="guide"    onclick="switchTab('guide')">guide</button>
  <button id="fontBtn" onclick="cycleFontSize()" aria-label="change font size">text: large</button>
</div>

<div id="scriptFilters" style="display:none">
  <span class="script-filter-label">alphabet:</span>
  <button class="script-btn" data-script="hiragana"   onclick="toggleScript('hiragana')">hiragana</button>
  <button class="script-btn" data-script="katakana"   onclick="toggleScript('katakana')">katakana</button>
  <button class="script-btn" data-script="kanji"      onclick="toggleScript('kanji')">kanji</button>
  <button class="script-btn" data-script="hiragana_d" onclick="toggleScript('hiragana_d')">hiragana accents</button>
  <button class="script-btn" data-script="katakana_d" onclick="toggleScript('katakana_d')">katakana accents</button>
</div>

<div id="mainContent"></div>

<div id="studyOverlay" onclick="overlayClick(event)">
  <div id="studyModal">
    <div class="m-top">
      <span class="m-title">study mode</span>
      <span class="m-meta" id="mMeta"></span>
      <button class="m-close" onclick="closeStudy()">✕</button>
    </div>
    <div class="card-hint">tap card to flip · tap next to continue</div>
    <div class="card-scene" onclick="flipCard()">
      <div class="fcard" id="fcard">
        <div class="face front" id="cFront"></div>
        <div class="face back"  id="cBack"></div>
      </div>
    </div>
    <div id="normalControls">
      <div class="m-nav"><button class="abtn accent" style="width:100%" onclick="nextCard()">next →</button></div>
      <div class="m-reshuffle"><button class="abtn" onclick="reshuffleStudy()">↺ reshuffle</button></div>
    </div>
    <div id="srsControls" style="display:none;flex-direction:column;gap:8px">
      <div style="display:flex;gap:8px">
        <button class="abtn danger" style="flex:1;font-size:.85rem;padding:10px" onclick="srsAgain()" id="againBtn">↺ again</button>
        <button class="abtn accent" style="flex:1;font-size:.85rem;padding:10px" onclick="srsGood()"  id="goodBtn">✓ good</button>
      </div>
      <div style="text-align:center;font-size:.65rem;color:var(--mu)" id="srsHint">flip the card first</div>
    </div>
  </div>
</div>

<div id="bsOverlay" onclick="closeBs()" style="display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:500"></div>
<div id="bottomSheet" style="display:none;position:fixed;bottom:0;left:0;right:0;z-index:501;border-radius:18px 18px 0 0;padding:0 0 env(safe-area-inset-bottom,0);max-height:75vh;overflow-y:auto">
  <div style="width:36px;height:4px;border-radius:99px;margin:10px auto 0;background:var(--bd2)"></div>
  <div id="bsWord" style="padding:14px 20px 4px;font-family:'Noto Sans KR',sans-serif;font-size:1.1rem;font-weight:500;color:var(--tx)"></div>
  <div id="bsMeaning" style="padding:0 20px 10px;font-size:.75rem;color:var(--mu)"></div>
  <div style="padding:0 12px 4px;font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--su)">add to deck</div>
  <div id="bsDecks" style="padding:0 12px 8px;display:flex;flex-direction:column;gap:4px"></div>
  <div style="padding:4px 12px 16px;border-top:1px solid var(--bd);margin-top:4px">
    <button onclick="bsNewDeck()" style="width:100%;padding:12px;border-radius:10px;border:1px dashed var(--bd2);background:none;color:var(--acc);font-family:'DM Mono',monospace;font-size:.8rem;cursor:pointer;text-align:left">+ create new deck</button>
  </div>
</div>

<div id="customWordOverlay">
  <div id="customWordModal">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <span style="font-family:'DM Serif Display',serif;font-size:1.05rem">custom word builder</span>
      <button class="m-close" onclick="closeCustomWord()">✕</button>
    </div>
    <div style="font-size:.72rem;color:var(--mu)">click letters to build a word, then fill in the meaning and save it to a deck</div>
    <div class="cwb-display" id="cwbDisplay"></div>
    <div style="display:flex;gap:6px;align-items:center">
      <input id="cwbRo"      type="text" placeholder="romanization (e.g. annyeong)" style="flex:1"/>
      <input id="cwbMeaning" type="text" placeholder="meaning" style="flex:1"/>
    </div>
    <div style="display:flex;gap:6px">
      <button class="ubtn" onclick="cwbBackspace()">⌫ delete</button>
      <button class="ubtn" onclick="cwbClear()">clear</button>
      <button class="ubtn" onclick="cwbAddSpace()">space</button>
      <button class="abtn accent" style="margin-left:auto" onclick="cwbSave()">save to deck →</button>
    </div>
    <div id="cwbAlpha" class="cwb-alpha"></div>
  </div>
</div>

<div class="lang-menu" id="langMenu">
  <div class="lang-option active" data-lang="korean"   onclick="switchLang('korean')"><span>🇰🇷</span><span>Korean</span><span class="lang-script">한국어</span></div>
  <div class="lang-option"        data-lang="italian"  onclick="switchLang('italian')"><span>🇮🇹</span><span>Italian</span><span class="lang-script">Italiano</span></div>
  <div class="lang-option"        data-lang="japanese" onclick="switchLang('japanese')"><span>🇯🇵</span><span>Japanese</span><span class="lang-script">日本語</span></div>
</div>

<div id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
