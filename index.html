<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>한국어 Korean Flashcards</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Mono:wght@400;500&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Mono',monospace;min-height:100vh;transition:background .2s,color .2s}
body.dark{background:#0e0e12;color:#f0eee8}
body.light{background:#f4f2ed;color:#1c1a16}

/* surfaces */
body.dark  .surface  {background:#16161c}
body.dark  .surface2 {background:#1e1e28}
body.light .surface  {background:#fff}
body.light .surface2 {background:#ebe8e2}

/* borders */
body.dark  .bd  {border-color:rgba(255,255,255,.08)}
body.dark  .bd2 {border-color:rgba(255,255,255,.15)}
body.light .bd  {border-color:rgba(0,0,0,.09)}
body.light .bd2 {border-color:rgba(0,0,0,.18)}

/* text */
body.dark  .t-muted{color:#888894}
body.dark  .t-subtle{color:#55555f}
body.light .t-muted{color:#6a6760}
body.light .t-subtle{color:#a09d96}

/* accent */
body.dark  {--acc:#c8a87a;--acc-bg:rgba(200,168,122,.1);--acc-bd:rgba(200,168,122,.28)}
body.light {--acc:#8c5e20;--acc-bg:rgba(140,94,32,.08);--acc-bd:rgba(140,94,32,.28)}

/* scrollbar */
::-webkit-scrollbar{width:5px}
body.dark  ::-webkit-scrollbar-thumb{background:#2a2a3a}
body.light ::-webkit-scrollbar-thumb{background:#ccc}

/* ── HEADER ── */
#hdr{padding:1.5rem 2rem 1.1rem;border-bottom:1px solid;display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:.75rem;position:sticky;top:0;z-index:100;transition:background .2s}
body.dark  #hdr{background:#0e0e12;border-color:rgba(255,255,255,.08)}
body.light #hdr{background:#f4f2ed;border-color:rgba(0,0,0,.09)}
.logo-kr{font-family:'Noto Sans KR',sans-serif;font-weight:700;font-size:.78rem;color:var(--acc);letter-spacing:.15em;display:block}
.logo-en{font-family:'DM Serif Display',serif;font-size:1.7rem;line-height:1;display:block}
.logo-sub{font-size:.6rem;letter-spacing:.12em;text-transform:uppercase;margin-top:3px;display:block}
.hdr-r{display:flex;align-items:center;gap:.9rem}
#themeBtn{font-family:'DM Mono',monospace;font-size:.7rem;padding:5px 13px;border-radius:99px;border:1px solid;cursor:pointer;transition:all .15s;letter-spacing:.04em}
body.dark  #themeBtn{background:#1e1e28;border-color:rgba(255,255,255,.15);color:#888894}
body.light #themeBtn{background:#ebe8e2;border-color:rgba(0,0,0,.18);color:#6a6760}
#themeBtn:hover{border-color:var(--acc);color:var(--acc)}
.deck-lbl{font-size:.7rem}
body.dark  .deck-lbl{color:#888894}
body.light .deck-lbl{color:#6a6760}
#deckBadge{background:var(--acc);color:#fff;font-weight:500;padding:2px 9px;border-radius:99px;font-size:.7rem;min-width:24px;text-align:center;display:inline-block;transition:transform .15s}
#deckBadge.pop{transform:scale(1.35)}

/* ── CONTROLS ── */
#ctrl{padding:.8rem 2rem;border-bottom:1px solid;position:sticky;top:85px;z-index:90;transition:background .2s}
body.dark  #ctrl{background:#0e0e12;border-color:rgba(255,255,255,.08)}
body.light #ctrl{background:#f4f2ed;border-color:rgba(0,0,0,.09)}
.ctrl-row{display:flex;gap:7px;flex-wrap:wrap;align-items:center;margin-bottom:7px}
.ctrl-row:last-child{margin-bottom:0}
#searchInput{font-family:'DM Mono',monospace;font-size:.76rem;padding:7px 13px;border-radius:6px;border:1px solid;outline:none;width:260px;transition:border-color .2s,background .2s}
body.dark  #searchInput{background:#1e1e28;border-color:rgba(255,255,255,.15);color:#f0eee8}
body.light #searchInput{background:#fff;border-color:rgba(0,0,0,.18);color:#1c1a16}
#searchInput::placeholder{color:#55555f}
body.light #searchInput::placeholder{color:#a09d96}
#searchInput:focus{border-color:var(--acc)}

/* group + util buttons */
.gbtn,.ubtn{font-family:'DM Mono',monospace;font-size:.67rem;padding:5px 12px;border-radius:99px;border:1px solid;cursor:pointer;transition:all .15s;white-space:nowrap;letter-spacing:.03em}
body.dark  .gbtn,.dark .ubtn{background:#1e1e28;border-color:rgba(255,255,255,.15);color:#888894}
body.light .gbtn,.light .ubtn{background:#fff;border-color:rgba(0,0,0,.18);color:#6a6760}
.gbtn:hover,.ubtn:hover{border-color:var(--acc);color:var(--acc)}
.gbtn.on{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:500}
.ubtn{border-radius:6px;font-size:.68rem;padding:5px 11px}
body.dark  .ubtn{background:#1e1e28;border-color:rgba(255,255,255,.15);color:#888894}
body.light .ubtn{background:#fff;border-color:rgba(0,0,0,.18);color:#6a6760}

/* ── SECTIONS ── */
#wordSections{padding:1rem 2rem .5rem;display:flex;flex-direction:column;gap:7px}
.sec{border:1px solid;border-radius:10px;overflow:hidden;transition:border-color .15s}
body.dark  .sec{border-color:rgba(255,255,255,.08)}
body.light .sec{border-color:rgba(0,0,0,.09)}
body.dark  .sec:hover{border-color:rgba(255,255,255,.15)}
body.light .sec:hover{border-color:rgba(0,0,0,.18)}

.sec-hdr{display:flex;align-items:center;justify-content:space-between;padding:.8rem 1.2rem;cursor:pointer;user-select:none;transition:background .15s}
body.dark  .sec-hdr{background:#16161c}
body.light .sec-hdr{background:#fff}
body.dark  .sec-hdr:hover{background:#1e1e28}
body.light .sec-hdr:hover{background:#ebe8e2}

.sec-left{display:flex;align-items:center;gap:9px}
.sec-name{font-size:.7rem;letter-spacing:.1em;text-transform:uppercase;font-weight:500}
.sec-count{font-size:.62rem;padding:2px 8px;border-radius:99px;border:1px solid}
body.dark  .sec-count{background:#1e1e28;border-color:rgba(255,255,255,.1);color:#888894}
body.light .sec-count{background:#ebe8e2;border-color:rgba(0,0,0,.12);color:#6a6760}
.sec-sel{font-size:.62rem;padding:2px 8px;border-radius:99px;background:var(--acc-bg);border:1px solid var(--acc-bd);color:var(--acc)}
.sec-chev{font-size:.62rem}
body.dark  .sec-chev{color:#55555f}
body.light .sec-chev{color:#a09d96}

.sec-body{display:none;flex-wrap:wrap;gap:6px;padding:.8rem 1.2rem 1rem;border-top:1px solid;transition:background .2s}
body.dark  .sec-body{border-color:rgba(255,255,255,.08);background:#0e0e12}
body.light .sec-body{border-color:rgba(0,0,0,.09);background:#f4f2ed}

/* ── WORD CHIPS ── */
@keyframes cin{from{opacity:0;transform:translateY(3px)}to{opacity:1;transform:none}}
.chip{display:flex;flex-direction:column;gap:2px;border:1px solid;border-radius:6px;padding:7px 11px 8px;cursor:pointer;user-select:none;transition:background .12s,border-color .12s;animation:cin .14s ease both}
body.dark  .chip{background:#16161c;border-color:rgba(255,255,255,.08)}
body.light .chip{background:#fff;border-color:rgba(0,0,0,.09)}
body.dark  .chip:hover{background:#1e1e28;border-color:rgba(255,255,255,.15)}
body.light .chip:hover{background:#ebe8e2;border-color:rgba(0,0,0,.18)}
.chip.on{border-color:var(--acc);background:var(--acc-bg)}
.chip.on .chip-kr{color:var(--acc)}
.chip-kr{font-family:'Noto Sans KR',sans-serif;font-size:.98rem;font-weight:500;line-height:1.2}
.chip-ro{font-size:.58rem}
body.dark  .chip-ro{color:#888894}
body.light .chip-ro{color:#6a6760}
.empty-msg{font-size:.74rem;width:100%;text-align:center;padding:1.5rem 0}
body.dark  .empty-msg{color:#55555f}
body.light .empty-msg{color:#a09d96}

/* ── DECK PANEL ── */
#deckPanel{border-top:1px solid;padding:1.2rem 2rem 2rem;margin-top:.5rem;transition:background .2s}
body.dark  #deckPanel{background:#16161c;border-color:rgba(255,255,255,.08)}
body.light #deckPanel{background:#fff;border-color:rgba(0,0,0,.09)}
.deck-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:.9rem}
.deck-title{font-family:'DM Serif Display',serif;font-size:1.05rem}
.deck-acts{display:flex;gap:7px}
.abtn{font-family:'DM Mono',monospace;font-size:.7rem;padding:6px 14px;border-radius:6px;border:1px solid;cursor:pointer;transition:all .15s;letter-spacing:.03em}
body.dark  .abtn{background:#1e1e28;border-color:rgba(255,255,255,.15);color:#f0eee8}
body.light .abtn{background:#ebe8e2;border-color:rgba(0,0,0,.18);color:#1c1a16}
.abtn:hover{border-color:var(--acc);color:var(--acc)}
body.dark  .abtn:hover{background:#26263a}
body.light .abtn:hover{background:#dedad2}
.abtn.accent{background:var(--acc);border-color:var(--acc);color:#fff;font-weight:500}
.abtn.accent:hover{opacity:.85;color:#fff}
.abtn.danger{color:#c87a7a;border-color:rgba(200,122,122,.3);background:transparent}
.abtn.danger:hover{background:rgba(200,122,122,.08);border-color:#c87a7a}
body.light .abtn.danger{color:#8c2020;border-color:rgba(140,32,32,.3)}

#deckChips{display:flex;flex-wrap:wrap;gap:6px;min-height:28px}
.dchip{display:flex;align-items:center;gap:5px;background:var(--acc-bg);border:1px solid var(--acc-bd);border-radius:99px;padding:3px 7px 3px 11px;font-size:.78rem;color:var(--acc);font-family:'Noto Sans KR',sans-serif;animation:cin .13s ease both}
.dchip-ro{font-family:'DM Mono',monospace;font-size:.58rem}
body.dark  .dchip-ro{color:#888894}
body.light .dchip-ro{color:#6a6760}
.dchip-x{background:none;border:none;cursor:pointer;font-size:12px;padding:0 2px;transition:color .12s}
body.dark  .dchip-x{color:#888894}
body.light .dchip-x{color:#6a6760}
.dchip-x:hover{color:#c87a7a}
.empty-deck{font-size:.7rem}
body.dark  .empty-deck{color:#55555f}
body.light .empty-deck{color:#a09d96}

/* ── MODAL ── */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;align-items:center;justify-content:center;padding:1rem}
#overlay.open{display:flex}
#modal{border:1px solid;border-radius:12px;width:100%;max-width:480px;padding:1.6rem;display:flex;flex-direction:column;gap:1rem;transition:background .2s}#overlay.open #modal{animation:cin .2s ease both}
body.dark  #modal{background:#16161c;border-color:rgba(255,255,255,.15)}
body.light #modal{background:#fff;border-color:rgba(0,0,0,.18)}
.m-top{display:flex;align-items:center;justify-content:space-between;gap:.8rem}
.m-title{font-family:'DM Serif Display',serif;font-size:1.05rem}
.m-meta{font-size:.65rem;flex:1}
body.dark  .m-meta{color:#888894}
body.light .m-meta{color:#6a6760}
.m-close{background:none;border:none;cursor:pointer;font-size:1rem;padding:4px;transition:color .12s}
body.dark  .m-close{color:#888894}
body.light .m-close{color:#6a6760}
body.dark  .m-close:hover{color:#f0eee8}
body.light .m-close:hover{color:#1c1a16}
.card-hint{text-align:center;font-size:.6rem;letter-spacing:.06em}
body.dark  .card-hint{color:#55555f}
body.light .card-hint{color:#a09d96}
.card-scene{perspective:1100px;height:210px;cursor:pointer}
.fcard{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .48s cubic-bezier(.4,0,.2,1)}
.fcard.flip{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;border-radius:10px;border:1px solid;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:1.75rem 1.25rem;text-align:center;transition:background .2s}
body.dark  .face{background:#1e1e28;border-color:rgba(255,255,255,.15)}
body.light .face{background:#ebe8e2;border-color:rgba(0,0,0,.18)}
.face.back{transform:rotateY(180deg)}
.fc-kr{font-family:'Noto Sans KR',sans-serif;font-size:2.8rem;font-weight:700;line-height:1}
.fc-ro{font-size:.8rem}
body.dark  .fc-ro{color:#888894}
body.light .fc-ro{color:#6a6760}
.fc-pos{font-size:.58rem;text-transform:uppercase;letter-spacing:.1em}
body.dark  .fc-pos{color:#55555f}
body.light .fc-pos{color:#a09d96}
.fc-meaning{font-family:'DM Serif Display',serif;font-size:1.3rem;line-height:1.2}
.fc-ex{font-size:.72rem;font-style:italic;line-height:1.5;margin-top:3px}
body.dark  .fc-ex{color:#888894}
body.light .fc-ex{color:#6a6760}
.m-nav{display:flex;align-items:center;justify-content:center}
.m-prog{font-size:.7rem;text-align:center}
body.dark  .m-prog{color:#888894}
body.light .m-prog{color:#6a6760}
.m-reshuffle{text-align:center}
.deck-switcher{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:.85rem}
.dbtn{font-family:'DM Mono',monospace;font-size:.68rem;padding:5px 11px 5px 8px;border-radius:99px;border:1px solid;cursor:pointer;transition:all .15s;display:flex;align-items:center;gap:6px;letter-spacing:.03em}
body.dark  .dbtn{background:#1e1e28;border-color:rgba(255,255,255,.12);color:#888894}
body.light .dbtn{background:#fff;border-color:rgba(0,0,0,.15);color:#6a6760}
.dbtn.dactive{border-color:var(--dc);color:var(--dc)}
body.dark  .dbtn.dactive{background:rgba(255,255,255,.04)}
body.light .dbtn.dactive{background:rgba(0,0,0,.03)}
.ddot{width:8px;height:8px;border-radius:50%;background:var(--dc);flex-shrink:0}
.dct{font-size:.6rem;opacity:.7}
.chip.on{border-width:1.5px}

@media(max-width:600px){
  #hdr,#ctrl,#deckPanel{padding-left:1rem;padding-right:1rem}
  #wordSections{padding:1rem 1rem .5rem}
  #searchInput{width:100%}
  #ctrl{top:74px}
}
</style>
</head>
<body class="dark">

<div id="hdr">
  <div class="logo">
    <span class="logo-kr">한국어</span>
    <span class="logo-en">Korean Flashcards</span>
    <span class="logo-sub t-subtle">click words · build your deck · study</span>
  </div>
  <div class="hdr-r">
    <button id="themeBtn">light mode</button>
    <div style="display:flex;align-items:center;gap:7px">
      <span class="deck-lbl">deck</span>
      <span id="deckBadge">0</span>
    </div>
  </div>
</div>

<div id="ctrl">
  <div class="ctrl-row">
    <input id="searchInput" type="text" placeholder="search hangul, romanization, or meaning…"/>
    <div id="groupBar"></div>
  </div>
  <div class="ctrl-row">
    <button class="ubtn" onclick="expandAll()">expand all</button>
    <button class="ubtn" onclick="collapseAll()">collapse all</button>
  </div>
</div>

<div id="wordSections"></div>

<div id="deckPanel">
  <div class="deck-hdr">
    <span class="deck-title">your deck</span>
    <div class="deck-acts">
      <button class="abtn danger" onclick="clearDeck()">remove all</button>
      <button class="abtn accent" onclick="openStudy()">study deck →</button>
    </div>
  </div>
  <div id="deckSwitcher" class="deck-switcher"></div>
  <div id="deckChips"><span class="empty-deck">no words yet — click any word above to add it</span></div>
</div>

<div id="overlay" onclick="overlayClick(event)">
  <div id="modal">
    <div class="m-top">
      <span class="m-title">study mode</span>
      <span class="m-meta" id="mMeta"></span>
      <button class="m-close" onclick="closeStudy()">✕</button>
    </div>
    <div class="card-hint">tap to flip · arrows to navigate · space to flip</div>
    <div class="card-scene" onclick="flipCard()">
      <div class="fcard" id="fcard">
        <div class="face front" id="cFront"></div>
        <div class="face back"  id="cBack"></div>
      </div>
    </div>
    <div class="m-nav">
      <button class="abtn accent" style="width:100%;justify-content:center" onclick="nextCard()">next →</button>
    </div>
    <div class="m-reshuffle">
      <button class="abtn" onclick="reshuffleStudy()">↺ reshuffle</button>
    </div>
  </div>
</div>

<script>
var WORDS=[
{kr:"눈",ro:"nun",meaning:"eye / eyes",example:"눈이 예뻐요 — your eyes are pretty",pos:"noun",freq:9},
{kr:"빠져",ro:"ppajyeo",meaning:"falling into / drawn in",example:"나 빠져 — I'm falling for you",pos:"verb",freq:7},
{kr:"느껴",ro:"neukkyeo",meaning:"feeling / I feel",example:"뭔가 느껴 — I feel something",pos:"verb",freq:7},
{kr:"자꾸",ro:"jakku",meaning:"repeatedly / keeps happening",example:"자꾸 생각나 — keeps coming to mind",pos:"adverb",freq:7},
{kr:"끌려",ro:"kkeullyeo",meaning:"being pulled / attracted",example:"네게 끌려 — being pulled toward you",pos:"verb",freq:6},
{kr:"설레",ro:"seolle",meaning:"heart fluttering / excited feeling",example:"설레는 기분 — a heart-fluttering feeling",pos:"verb",freq:6},
{kr:"떨려",ro:"tteollyeo",meaning:"trembling / heart racing",example:"심장이 떨려 — my heart is trembling",pos:"verb",freq:6},
{kr:"자석",ro:"jaseok",meaning:"magnet",example:"자석처럼 끌려 — pulled like a magnet",pos:"noun",freq:4},
{kr:"순간",ro:"sungan",meaning:"moment / instant",example:"그 순간 — that moment",pos:"noun",freq:8},
{kr:"가까이",ro:"gakkai",meaning:"close / near",example:"가까이 와 — come closer",pos:"adverb",freq:7},
{kr:"바라봐",ro:"barabwa",meaning:"look at / gaze at",example:"나를 바라봐 — look at me",pos:"verb",freq:6},
{kr:"심장",ro:"simjang",meaning:"heart (organ) / heartbeat",example:"심장이 뛰어 — my heart is beating",pos:"noun",freq:6},
{kr:"머릿속",ro:"meoritssok",meaning:"inside one's head / mind",example:"머릿속이 복잡해 — my head is a mess",pos:"noun",freq:5},
{kr:"두근두근",ro:"dugeundugeun",meaning:"thump-thump (heartbeat sound)",example:"두근두근 떨려 — thump thump I'm trembling",pos:"expression",freq:4},
{kr:"뻔해",ro:"ppeonhae",meaning:"obvious / predictable",example:"너무 뻔해 — so obvious",pos:"adjective",freq:5},
{kr:"자꾸만",ro:"jakkuman",meaning:"just keeps on / over and over",example:"자꾸만 생각나 — just keeps coming to mind",pos:"adverb",freq:5},
{kr:"온통",ro:"ontong",meaning:"entirely / all over",example:"온통 너야 — it's all you",pos:"adverb",freq:5},
{kr:"모르게",ro:"moreuge",meaning:"unknowingly / without realizing",example:"나도 모르게 — without even realizing it",pos:"adverb",freq:5},
{kr:"멈춰",ro:"meomchwo",meaning:"stop / halt",example:"멈춰 서 — stop right there",pos:"verb",freq:6},
{kr:"달라",ro:"dalla",meaning:"different / unlike",example:"뭔가 달라 — something's different",pos:"adjective",freq:7},
{kr:"그냥",ro:"geunyang",meaning:"just / simply / without reason",example:"그냥 좋아 — I just like it",pos:"adverb",freq:9},
{kr:"왠지",ro:"waenji",meaning:"for some reason / somehow",example:"왠지 좋아 — I like it for some reason",pos:"adverb",freq:7},
{kr:"처음",ro:"cheoeum",meaning:"first time / beginning",example:"처음 만났을 때 — when we first met",pos:"noun",freq:8},
{kr:"익숙해",ro:"iksukhae",meaning:"familiar / used to",example:"점점 익숙해져 — getting more familiar",pos:"adjective",freq:6},
{kr:"나",ro:"na",meaning:"I / me (informal)",example:"나 좋아해 — I like you",pos:"pronoun",freq:10},
{kr:"너",ro:"neo",meaning:"you (informal)",example:"너 때문에 — because of you",pos:"pronoun",freq:10},
{kr:"우리",ro:"uri",meaning:"we / us / our",example:"우리 같이 가자 — let's go together",pos:"pronoun",freq:10},
{kr:"저",ro:"jeo",meaning:"I / me (formal)",example:"저는 학생이에요 — I am a student",pos:"pronoun",freq:9},
{kr:"당신",ro:"dangsin",meaning:"you (formal/written)",example:"당신을 사랑해요 — I love you",pos:"pronoun",freq:7},
{kr:"그",ro:"geu",meaning:"he / that / the",example:"그 사람 — that person",pos:"pronoun",freq:8},
{kr:"그녀",ro:"geunyeo",meaning:"she / her",example:"그녀는 예뻐 — she is pretty",pos:"pronoun",freq:7},
{kr:"이것",ro:"igeot",meaning:"this (thing)",example:"이것은 뭐야? — what is this?",pos:"pronoun",freq:8},
{kr:"저것",ro:"jeogeot",meaning:"that (thing far away)",example:"저것은 뭐야? — what is that?",pos:"pronoun",freq:7},
{kr:"누구",ro:"nugu",meaning:"who",example:"누구야? — who is it?",pos:"pronoun",freq:9},
{kr:"무엇",ro:"mueot",meaning:"what",example:"무엇을 원해? — what do you want?",pos:"pronoun",freq:9},

// AVAILABLE PALETTE — cycles through for new decks
var PALETTE=['#c8a87a','#7ac8a0','#7a8cc8','#c87aa8','#7ac8c8','#c8c87a','#c87a7a','#a87ac8'];
// decks = [{name, color, words:{kr:true}}]
var decks=[];
var activeDeckIdx=-1; // -1 = no deck selected (click-to-add mode off)

function saveToStorage(){
  try{
    var data=decks.map(function(d){return{name:d.name,color:d.color,words:d.words};});
    localStorage.setItem('krfc-decks2',JSON.stringify(data));
    localStorage.setItem('krfc-active',activeDeckIdx);
  }catch(e){}
}
function loadFromStorage(){
  try{
    var raw=localStorage.getItem('krfc-decks2');
    if(raw){decks=JSON.parse(raw);}
    var ai=localStorage.getItem('krfc-active');
    if(ai!==null)activeDeckIdx=parseInt(ai,10);
    if(activeDeckIdx>=decks.length)activeDeckIdx=-1;
  }catch(e){}
}
function nextColor(){
  var used=decks.map(function(d){return d.color;});
  for(var i=0;i<PALETTE.length;i++){if(used.indexOf(PALETTE[i])<0)return PALETTE[i];}
  return PALETTE[decks.length%PALETTE.length];
}
function addDeck(name){
  decks.push({name:name,color:nextColor(),words:{}});
  activeDeckIdx=decks.length-1;
  saveToStorage();
  renderDeckSwitcher();
  renderDeck();
  render();
}
function deleteDeck(idx){
  decks.splice(idx,1);
  if(activeDeckIdx>=decks.length)activeDeckIdx=decks.length-1;
  saveToStorage();
  renderDeckSwitcher();
  renderDeck();
  render();
}

var POS=['expression','verb','adjective','noun','adverb','pronoun','particle'];

var GROUPS={
  pos:{label:'part of speech',key:function(w){return w.pos},order:function(){return POS},color:function(k){return{verb:'#7a8cc8',noun:'#7ac8a0',adjective:'#c87aa8',adverb:'#c8a87a',expression:'#c87a7a',pronoun:'#7ac8c8',particle:'#c8c87a'}[k]||'#888'}},
  most_common:{label:'most common first',key:function(w){return w.freq>=10?'essential (10)':w.freq>=8?'very common (8-9)':w.freq>=6?'common (6-7)':w.freq>=4?'uncommon (4-5)':'rare (1-3)'},order:function(){return['essential (10)','very common (8-9)','common (6-7)','uncommon (4-5)','rare (1-3)']},color:function(){return'#7ac8a0'}},
  least_common:{label:'least common first',key:function(w){return w.freq>=10?'essential (10)':w.freq>=8?'very common (8-9)':w.freq>=6?'common (6-7)':w.freq>=4?'uncommon (4-5)':'rare (1-3)'},order:function(){return['rare (1-3)','uncommon (4-5)','common (6-7)','very common (8-9)','essential (10)']},color:function(){return'#c87a7a'}},
  shortest:{label:'shortest first',key:function(w){var l=w.kr.length;return l<=1?'1 char':l<=2?'2 chars':l<=3?'3 chars':l<=4?'4 chars':'5+ chars'},order:function(){return['1 char','2 chars','3 chars','4 chars','5+ chars']},color:function(){return'#7ac8c8'}},
  longest:{label:'longest first',key:function(w){var l=w.kr.length;return l<=1?'1 char':l<=2?'2 chars':l<=3?'3 chars':l<=4?'4 chars':'5+ chars'},order:function(){return['5+ chars','4 chars','3 chars','2 chars','1 char']},color:function(){return'#c87aa8'}},
  a_z:{label:'a → z',key:function(w){return w.ro[0].toUpperCase()},order:function(k){return k.slice().sort()},color:function(){return'#7a8cc8'}},
  z_a:{label:'z → a',key:function(w){return w.ro[0].toUpperCase()},order:function(k){return k.slice().sort().reverse()},color:function(){return'#c8a87a'}},
  in_deck:{label:'in my deck',key:function(w){return deckColorFor(w.kr)?'in a deck':'not in deck'},order:function(){return['in a deck','not in deck']},color:function(k){return k==='in a deck'?'#c8a87a':'#888'}}
};

// ── HELPERS ──
function deckColorFor(kr){
  for(var i=0;i<decks.length;i++){if(decks[i].words[kr])return decks[i].color;}
  return null;
}
function deckIdxFor(kr){
  for(var i=0;i<decks.length;i++){if(decks[i].words[kr])return i;}
  return -1;
}

// ── CONTEXT MENU ──
var ctxMenu=null;
function removeCtxMenu(){if(ctxMenu){ctxMenu.remove();ctxMenu=null;}}
document.addEventListener('click',removeCtxMenu);
document.addEventListener('keydown',function(e){if(e.key==='Escape')removeCtxMenu();});

function showCtxMenu(e,w){
  e.preventDefault();
  removeCtxMenu();
  var isDark=document.body.classList.contains('dark');
  var menu=document.createElement('div');
  menu.id='ctx-menu';
  menu.style.cssText='position:fixed;z-index:9999;border-radius:9px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);min-width:170px;';
  menu.style.background=isDark?'#1e1e28':'#fff';
  menu.style.border=isDark?'1px solid rgba(255,255,255,.14)':'1px solid rgba(0,0,0,.14)';

  // word label at top
  var wlbl=document.createElement('div');
  wlbl.style.cssText='padding:8px 13px 5px;font-family:Noto Sans KR,sans-serif;font-size:.9rem;font-weight:500;';
  wlbl.style.color=isDark?'#f0eee8':'#1c1a16';
  wlbl.textContent=w.kr+' — '+w.ro;
  menu.appendChild(wlbl);

  var hd=document.createElement('div');
  hd.style.cssText='padding:2px 13px 6px;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;';
  hd.style.color=isDark?'#55555f':'#a09d96';
  hd.textContent='add to deck';
  menu.appendChild(hd);

  if(decks.length===0){
    var none=document.createElement('div');
    none.style.cssText='padding:6px 13px 8px;font-size:.72rem;';
    none.style.color=isDark?'#55555f':'#a09d96';
    none.textContent='no decks yet — create one below';
    menu.appendChild(none);
  } else {
    decks.forEach(function(deck,i){
      var inThis=!!deck.words[w.kr];
      var row=document.createElement('div');
      row.style.cssText='padding:7px 13px;font-size:.74rem;cursor:pointer;display:flex;align-items:center;gap:9px;font-family:DM Mono,monospace;';
      row.style.color=isDark?'#f0eee8':'#1c1a16';
      var dot=document.createElement('span');
      dot.style.cssText='width:9px;height:9px;border-radius:50%;flex-shrink:0;border:2px solid '+deck.color+';transition:background .1s;';
      if(inThis)dot.style.background=deck.color;
      var lbl=document.createElement('span');lbl.style.flex='1';lbl.textContent=deck.name+(inThis?' ✓':'');
      row.appendChild(dot);row.appendChild(lbl);
      row.onmouseenter=function(){row.style.background=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.05)';};
      row.onmouseleave=function(){row.style.background='';};
      row.onclick=function(ev){
        ev.stopPropagation();
        // remove from all decks first
        decks.forEach(function(d){delete d.words[w.kr];});
        // if wasn't in this one, add it; otherwise just removed (toggle)
        if(!inThis)deck.words[w.kr]=true;
        saveToStorage();removeCtxMenu();renderDeckSwitcher();renderDeck();render();
      };
      menu.appendChild(row);
    });
  }

  // divider
  var div=document.createElement('div');
  div.style.cssText='border-top:1px solid;margin:3px 0;';
  div.style.borderColor=isDark?'rgba(255,255,255,.08)':'rgba(0,0,0,.08)';
  menu.appendChild(div);

  // add new deck
  var addRow=document.createElement('div');
  addRow.style.cssText='padding:7px 13px;font-size:.72rem;cursor:pointer;display:flex;align-items:center;gap:8px;font-family:DM Mono,monospace;';
  addRow.style.color=isDark?'#7ac8a0':'#1a7a4a';
  addRow.textContent='+ new deck';
  addRow.onmouseenter=function(){addRow.style.background=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.05)';};
  addRow.onmouseleave=function(){addRow.style.background='';};
  addRow.onclick=function(ev){
    ev.stopPropagation();
    var name=prompt('Name your new deck:','');
    if(name&&name.trim()){
      addDeck(name.trim());
      // auto-add this word to the new deck
      decks[decks.length-1].words[w.kr]=true;
      saveToStorage();renderDeckSwitcher();renderDeck();render();
    }
    removeCtxMenu();
  };
  menu.appendChild(addRow);

  // position
  var x=e.clientX,y=e.clientY;
  menu.style.left=x+'px';menu.style.top=y+'px';
  document.body.appendChild(menu);ctxMenu=menu;
  var r=menu.getBoundingClientRect();
  if(r.right>window.innerWidth-8)menu.style.left=(x-r.width)+'px';
  if(r.bottom>window.innerHeight-8)menu.style.top=(y-r.height)+'px';
}

// ── DECK SWITCHER ──
function renderDeckSwitcher(){
  var sw=document.getElementById('deckSwitcher');
  sw.innerHTML='';

  if(decks.length===0){
    var empty=document.createElement('div');
    empty.className='empty-deck';
    empty.style.paddingBottom='4px';
    empty.textContent='right-click any word to create your first deck';
    sw.appendChild(empty);
    return;
  }

  decks.forEach(function(deck,i){
    var btn=document.createElement('button');
    btn.className='dbtn'+(i===activeDeckIdx?' dactive':'');
    btn.style.setProperty('--dc',deck.color);

    var dot=document.createElement('span');dot.className='ddot';dot.style.background=deck.color;
    var lbl=document.createElement('span');lbl.textContent=deck.name;
    var ct=document.createElement('span');ct.className='dct';
    var wcount=Object.keys(deck.words).length;
    if(wcount>0)ct.textContent=wcount;

    btn.appendChild(dot);btn.appendChild(lbl);btn.appendChild(ct);

    btn.onclick=function(){
      activeDeckIdx=i===activeDeckIdx?-1:i; // click active deck to deselect
      saveToStorage();renderDeckSwitcher();renderDeck();render();
    };

    // right-click deck button to rename or delete
    btn.oncontextmenu=function(e){
      e.preventDefault();
      removeCtxMenu();
      var isDark=document.body.classList.contains('dark');
      var menu=document.createElement('div');
      menu.id='ctx-menu';
      menu.style.cssText='position:fixed;z-index:9999;border-radius:9px;overflow:hidden;box-shadow:0 8px 32px rgba(0,0,0,.4);min-width:140px;';
      menu.style.background=isDark?'#1e1e28':'#fff';
      menu.style.border=isDark?'1px solid rgba(255,255,255,.14)':'1px solid rgba(0,0,0,.14)';

      var deckHd=document.createElement('div');
      deckHd.style.cssText='padding:7px 13px 5px;font-size:.65rem;letter-spacing:.08em;font-weight:500;text-transform:uppercase;';
      deckHd.style.color=deck.color;deckHd.textContent=deck.name;
      menu.appendChild(deckHd);

      function menuRow(label,color,fn){
        var row=document.createElement('div');
        row.style.cssText='padding:7px 13px;font-size:.74rem;cursor:pointer;font-family:DM Mono,monospace;';
        row.style.color=color||(isDark?'#f0eee8':'#1c1a16');
        row.textContent=label;
        row.onmouseenter=function(){row.style.background=isDark?'rgba(255,255,255,.06)':'rgba(0,0,0,.05)';};
        row.onmouseleave=function(){row.style.background='';};
        row.onclick=function(ev){ev.stopPropagation();removeCtxMenu();fn();};
        menu.appendChild(row);
      }
      menuRow('rename',null,function(){
        var n=prompt('Rename deck:',deck.name);
        if(n&&n.trim()){deck.name=n.trim();saveToStorage();renderDeckSwitcher();renderDeck();}
      });
      menuRow('delete deck','#c87a7a',function(){
        if(confirm('Delete "'+deck.name+'"? Words won't be deleted.')){deleteDeck(i);}
      });

      var x=e.clientX,y=e.clientY;
      menu.style.left=x+'px';menu.style.top=y+'px';
      document.body.appendChild(menu);ctxMenu=menu;
      var r=menu.getBoundingClientRect();
      if(r.right>window.innerWidth-8)menu.style.left=(x-r.width)+'px';
      if(r.bottom>window.innerHeight-8)menu.style.top=(y-r.height)+'px';
    };

    sw.appendChild(btn);
  });

  // always show a + button at the end
  var addBtn=document.createElement('button');
  addBtn.className='dbtn';
  addBtn.style.setProperty('--dc','#7ac8a0');
  addBtn.style.color='#7ac8a0';
  addBtn.style.borderColor='rgba(122,200,160,.35)';
  addBtn.textContent='+ new deck';
  addBtn.onclick=function(){
    var name=prompt('Name your new deck:','');
    if(name&&name.trim())addDeck(name.trim());
  };
  sw.appendChild(addBtn);
}

// group buttons
function buildGroupBtns(){
  var bar=document.getElementById('groupBar');
  bar.innerHTML='';
  Object.keys(GROUPS).forEach(function(k){
    var b=document.createElement('button');
    b.className='gbtn'+(k===curGroup?' on':'');
    b.textContent=GROUPS[k].label;
    b.onclick=function(){curGroup=k;openSecs={};buildGroupBtns();render();};
    bar.appendChild(b);
  });
}

// render
function render(){
  var q=(document.getElementById('searchInput').value||'').toLowerCase().trim();
  var cfg=GROUPS[curGroup];
  var filtered=WORDS.filter(function(w){
    if(!q)return true;
    return w.kr.indexOf(q)!==-1||w.ro.toLowerCase().indexOf(q)!==-1||w.meaning.toLowerCase().indexOf(q)!==-1;
  });
  var groups={};
  filtered.forEach(function(w){
    var k=cfg.key(w);
    if(!groups[k])groups[k]=[];
    groups[k].push(w);
  });
  var allKeys=Object.keys(groups);
  var ordered=cfg.order(allKeys).filter(function(k){return groups[k]&&groups[k].length>0;});
  if(q)ordered.forEach(function(k){openSecs[k]=true;});
  var container=document.getElementById('wordSections');
  container.innerHTML='';
  if(ordered.length===0){container.innerHTML='<div class="empty-msg">no words match</div>';return;}
  ordered.forEach(function(key){
    var words=groups[key];
    var isOpen=!!openSecs[key];
    var selCount=words.filter(function(w){return deckColorFor(w.kr);}).length;
    var color=cfg.color(key);
    var sec=document.createElement('div');sec.className='sec';
    var hdr=document.createElement('div');hdr.className='sec-hdr';
    var left=document.createElement('div');left.className='sec-left';
    var nm=document.createElement('span');nm.className='sec-name';nm.style.color=color;nm.textContent=key;
    var ct=document.createElement('span');ct.className='sec-count';ct.textContent=words.length;
    left.appendChild(nm);left.appendChild(ct);
    if(selCount>0){var sl=document.createElement('span');sl.className='sec-sel';sl.textContent=selCount+' in deck';left.appendChild(sl);}
    var chev=document.createElement('span');chev.className='sec-chev';chev.textContent=isOpen?'▴':'▾';
    hdr.appendChild(left);hdr.appendChild(chev);
    var body=document.createElement('div');body.className='sec-body';body.style.display=isOpen?'flex':'none';
    words.forEach(function(w,i){
      var chip=document.createElement('div');chip.className='chip'+(deckColorFor(w.kr)?' on':'');
      chip.title=w.meaning+' — '+w.example;
      chip.style.animationDelay=Math.min(i*0.008,0.18)+'s';
      var chipColor=deckColorFor(w.kr);
      if(chipColor){chip.style.borderColor=chipColor;}
      var kr=document.createElement('span');kr.className='chip-kr';kr.textContent=w.kr;
      if(chipColor)kr.style.color=chipColor;
      var ro=document.createElement('span');ro.className='chip-ro';ro.textContent=w.ro;
      chip.appendChild(kr);chip.appendChild(ro);
      chip.onclick=function(){toggleWord(w);};
      chip.oncontextmenu=function(e){showCtxMenu(e,w);};
      body.appendChild(chip);
    });
    hdr.onclick=function(){
      if(openSecs[key]){delete openSecs[key];body.style.display='none';chev.textContent='▾';}
      else{openSecs[key]=true;body.style.display='flex';chev.textContent='▴';}
    };
    sec.appendChild(hdr);sec.appendChild(body);container.appendChild(sec);
  });
}

function expandAll(){
  var cfg=GROUPS[curGroup];
  WORDS.forEach(function(w){openSecs[cfg.key(w)]=true;});
  render();
}
function collapseAll(){openSecs={};render();}

// deck
function toggleWord(w){
  if(activeDeckIdx<0||activeDeckIdx>=decks.length){
    // no deck active — just a visual hint bounce, do nothing
    return;
  }
  var d=decks[activeDeckIdx].words;
  if(d[w.kr])delete d[w.kr];else d[w.kr]=true;
  saveToStorage();pop();renderDeck();render();
}
function pop(){
  var b=document.getElementById('deckBadge');
  b.classList.remove('pop');void b.offsetWidth;b.classList.add('pop');
  setTimeout(function(){b.classList.remove('pop');},200);
}
function renderDeck(){
  var c=document.getElementById('deckChips');
  var badge=document.getElementById('deckBadge');
  if(activeDeckIdx<0||activeDeckIdx>=decks.length){
    badge.textContent='0';
    c.innerHTML='<span class="empty-deck">select or create a deck below, then left-click words to add them</span>';
    return;
  }
  var deck=decks[activeDeckIdx];
  var keys=Object.keys(deck.words);
  badge.textContent=keys.length;
  if(keys.length===0){c.innerHTML='<span class="empty-deck">left-click words to add to <strong style="color:'+deck.color+'">'+deck.name+'</strong></span>';return;}
  c.innerHTML='';
  keys.forEach(function(kr){
    var w=WORDS.find(function(x){return x.kr===kr;});if(!w)return;
    var chip=document.createElement('div');chip.className='dchip';
    chip.style.borderColor=deck.color;chip.style.color=deck.color;
    var ks=document.createElement('span');ks.textContent=w.kr;
    var rs=document.createElement('span');rs.className='dchip-ro';rs.textContent=w.ro;
    var x=document.createElement('button');x.className='dchip-x';x.textContent='×';
    x.onclick=function(){delete deck.words[kr];saveToStorage();renderDeck();render();};
    chip.appendChild(ks);chip.appendChild(rs);chip.appendChild(x);c.appendChild(chip);
  });
}
function clearDeck(){
  if(activeDeckIdx<0||activeDeckIdx>=decks.length)return;
  decks[activeDeckIdx].words={};
  saveToStorage();renderDeck();render();
}

// study
function openStudy(){
  if(activeDeckIdx<0||activeDeckIdx>=decks.length){alert('Select a deck first by clicking it in the deck panel.');return;}
  var keys=Object.keys(decks[activeDeckIdx].words);
  if(keys.length===0){alert(decks[activeDeckIdx].name+' has no words yet. Add some first!');return;}
  studyList=shuffle(keys.map(function(kr){return WORDS.find(function(w){return w.kr===kr;});}).filter(Boolean));
  sIdx=0;sFlip=false;renderCard();
  document.getElementById('overlay').classList.add('open');
}
function reshuffleAndRender(){
  var cur=studyList[sIdx];
  studyList=shuffle(studyList);
  if(studyList[0].kr===cur.kr&&studyList.length>1){var t=studyList[0];studyList[0]=studyList[1];studyList[1]=t;}
  sIdx=0;renderCard();
}
function closeStudy(){document.getElementById('overlay').classList.remove('open');}
function overlayClick(e){if(e.target===document.getElementById('overlay'))closeStudy();}
function renderCard(){
  var w=studyList[sIdx];
  document.getElementById('cFront').innerHTML='<div class="fc-kr">'+w.kr+'</div><div class="fc-ro">'+w.ro+'</div><div class="fc-pos">'+w.pos+'</div>';
  document.getElementById('cBack').innerHTML='<div class="fc-meaning">'+w.meaning+'</div><div class="fc-ex">'+w.example+'</div>';

  document.getElementById('mMeta').textContent=w.pos;
  document.getElementById('fcard').classList.remove('flip');sFlip=false;
}
function flipCard(){sFlip=!sFlip;document.getElementById('fcard').classList.toggle('flip',sFlip);}
function nextCard(){
  sIdx++;
  if(sIdx>=studyList.length){
    var last=studyList[studyList.length-1];
    studyList=shuffle(studyList);
    if(studyList[0].kr===last.kr&&studyList.length>1){
      var t=studyList[0];studyList[0]=studyList[1];studyList[1]=t;
    }
    sIdx=0;
  }
  renderCard();
}
function prevCard(){sIdx=(sIdx-1+studyList.length)%studyList.length;renderCard();}
function reshuffleStudy(){reshuffleAndRender();}

function shuffle(a){
  var r=a.slice();
  for(var i=r.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=r[i];r[i]=r[j];r[j]=t;}
  return r;
}

document.addEventListener('keydown',function(e){
  if(!document.getElementById('overlay').classList.contains('open'))return;
  if(e.key==='Escape')closeStudy();
  if(e.key==='ArrowRight')nextCard();
  if(e.key==='ArrowLeft')prevCard();
  if(e.key===' '){e.preventDefault();flipCard();}
});

document.getElementById('searchInput').oninput=render;

loadFromStorage();
buildGroupBtns();
renderDeckSwitcher();
render();
</script>
